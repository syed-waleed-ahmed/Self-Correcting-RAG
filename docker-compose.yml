services:
  api:
    build: .
    image: self-correcting-rag:latest
    ports:
      - "8000:8000"
    environment:
      # Provide your key via a local .env file (see .env.example).
      GROQ_API_KEY: ${GROQ_API_KEY:?set GROQ_API_KEY in your environment or .env}
      SCRAG_LOG_JSON: "true"
    volumes:
      # Persist the vector index and mount your document corpus.
      - ./data/docs:/app/data/docs:ro
      - scrag_index:/app/data/index
      - hf_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  scrag_index:
  hf_cache:
